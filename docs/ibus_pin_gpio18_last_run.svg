<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="650" viewBox="0 0 1100 650">
  <rect width="1100" height="650" fill="#f7f7f2"/>
  <rect x="80" y="70" width="940" height="500" rx="6" fill="#ffffff" stroke="#deded6"/>

  <text x="550" y="42" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700" fill="#222">
    GPIO18 IBUS_PIN - ultima corrida
  </text>

  <text x="550" y="610" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#555">
    Datos: 2000 lecturas por muestra, intervalo nominal 50 us, ventana nominal ~100 ms
  </text>

  <!-- Chart frame -->
  <line x1="120" y1="500" x2="930" y2="500" stroke="#333" stroke-width="1.5"/>
  <line x1="120" y1="120" x2="120" y2="500" stroke="#333" stroke-width="1.5"/>
  <line x1="930" y1="120" x2="930" y2="500" stroke="#8f2d1d" stroke-width="1.2"/>

  <!-- Gridlines and left axis labels -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#555">
    <line x1="120" y1="500" x2="930" y2="500" stroke="#d8d8d0"/>
    <text x="106" y="505" text-anchor="end">0%</text>
    <line x1="120" y1="405" x2="930" y2="405" stroke="#d8d8d0"/>
    <text x="106" y="410" text-anchor="end">25%</text>
    <line x1="120" y1="310" x2="930" y2="310" stroke="#d8d8d0"/>
    <text x="106" y="315" text-anchor="end">50%</text>
    <line x1="120" y1="215" x2="930" y2="215" stroke="#d8d8d0"/>
    <text x="106" y="220" text-anchor="end">75%</text>
    <line x1="120" y1="120" x2="930" y2="120" stroke="#d8d8d0"/>
    <text x="106" y="125" text-anchor="end">100%</text>
  </g>

  <!-- Right axis labels for transitions, scale 0..32 -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#8f2d1d">
    <text x="944" y="505">0</text>
    <text x="944" y="410">8</text>
    <text x="944" y="315">16</text>
    <text x="944" y="220">24</text>
    <text x="944" y="125">32</text>
  </g>

  <text x="58" y="310" transform="rotate(-90 58 310)" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333">
    Porcentaje de lecturas
  </text>
  <text x="990" y="310" transform="rotate(90 990 310)" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#8f2d1d">
    Transiciones
  </text>

  <!-- Bars: x, y, width, height. Chart y 120..500, height 380. LOW is bottom, HIGH is top. -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">
    <!-- Sample 1: HIGH 1010, LOW 990, transitions 26 -->
    <rect x="170" y="311.9" width="78" height="188.1" fill="#3f5364"/>
    <rect x="170" y="120.0" width="78" height="191.9" fill="#2aa876"/>
    <text x="209" y="408" text-anchor="middle" fill="#fff">LOW</text>
    <text x="209" y="426" text-anchor="middle" fill="#fff">990</text>
    <text x="209" y="212" text-anchor="middle" fill="#fff">HIGH</text>
    <text x="209" y="230" text-anchor="middle" fill="#fff">1010</text>
    <text x="209" y="528" text-anchor="middle" fill="#333">1</text>

    <!-- Sample 2: HIGH 1010, LOW 990, transitions 26 -->
    <rect x="320" y="311.9" width="78" height="188.1" fill="#3f5364"/>
    <rect x="320" y="120.0" width="78" height="191.9" fill="#2aa876"/>
    <text x="359" y="408" text-anchor="middle" fill="#fff">LOW</text>
    <text x="359" y="426" text-anchor="middle" fill="#fff">990</text>
    <text x="359" y="212" text-anchor="middle" fill="#fff">HIGH</text>
    <text x="359" y="230" text-anchor="middle" fill="#fff">1010</text>
    <text x="359" y="528" text-anchor="middle" fill="#333">2</text>

    <!-- Sample 3: HIGH 1005, LOW 995, transitions 27 -->
    <rect x="470" y="310.9" width="78" height="189.1" fill="#3f5364"/>
    <rect x="470" y="120.0" width="78" height="190.9" fill="#2aa876"/>
    <text x="509" y="408" text-anchor="middle" fill="#fff">LOW</text>
    <text x="509" y="426" text-anchor="middle" fill="#fff">995</text>
    <text x="509" y="212" text-anchor="middle" fill="#fff">HIGH</text>
    <text x="509" y="230" text-anchor="middle" fill="#fff">1005</text>
    <text x="509" y="528" text-anchor="middle" fill="#333">3</text>

    <!-- Sample 4: HIGH 1008, LOW 992, transitions 26 -->
    <rect x="620" y="311.5" width="78" height="188.5" fill="#3f5364"/>
    <rect x="620" y="120.0" width="78" height="191.5" fill="#2aa876"/>
    <text x="659" y="408" text-anchor="middle" fill="#fff">LOW</text>
    <text x="659" y="426" text-anchor="middle" fill="#fff">992</text>
    <text x="659" y="212" text-anchor="middle" fill="#fff">HIGH</text>
    <text x="659" y="230" text-anchor="middle" fill="#fff">1008</text>
    <text x="659" y="528" text-anchor="middle" fill="#333">4</text>

    <!-- Sample 5: HIGH 1008, LOW 992, transitions 26 -->
    <rect x="770" y="311.5" width="78" height="188.5" fill="#3f5364"/>
    <rect x="770" y="120.0" width="78" height="191.5" fill="#2aa876"/>
    <text x="809" y="408" text-anchor="middle" fill="#fff">LOW</text>
    <text x="809" y="426" text-anchor="middle" fill="#fff">992</text>
    <text x="809" y="212" text-anchor="middle" fill="#fff">HIGH</text>
    <text x="809" y="230" text-anchor="middle" fill="#fff">1008</text>
    <text x="809" y="528" text-anchor="middle" fill="#333">5</text>
  </g>

  <text x="509" y="556" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333">
    Muestra IBUS_PIN
  </text>

  <!-- Transition line: right axis 0..32 maps to y 500..120. -->
  <polyline points="209,191.3 359,191.3 509,179.4 659,191.3 809,191.3" fill="none" stroke="#c2412d" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
  <g fill="#c2412d" stroke="#ffffff" stroke-width="2" font-family="Arial, Helvetica, sans-serif" font-size="13" font-weight="700">
    <circle cx="209" cy="191.3" r="6"/>
    <circle cx="359" cy="191.3" r="6"/>
    <circle cx="509" cy="179.4" r="6"/>
    <circle cx="659" cy="191.3" r="6"/>
    <circle cx="809" cy="191.3" r="6"/>
    <text x="209" y="176" text-anchor="middle" fill="#8f2d1d" stroke="none">26</text>
    <text x="359" y="176" text-anchor="middle" fill="#8f2d1d" stroke="none">26</text>
    <text x="509" y="164" text-anchor="middle" fill="#8f2d1d" stroke="none">27</text>
    <text x="659" y="176" text-anchor="middle" fill="#8f2d1d" stroke="none">26</text>
    <text x="809" y="176" text-anchor="middle" fill="#8f2d1d" stroke="none">26</text>
  </g>

  <!-- Legend -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="14" fill="#333">
    <rect x="360" y="575" width="18" height="12" fill="#2aa876"/>
    <text x="386" y="586">HIGH</text>
    <rect x="455" y="575" width="18" height="12" fill="#3f5364"/>
    <text x="481" y="586">LOW</text>
    <line x1="550" y1="581" x2="578" y2="581" stroke="#c2412d" stroke-width="4"/>
    <circle cx="564" cy="581" r="5" fill="#c2412d"/>
    <text x="588" y="586">Transiciones</text>
  </g>
</svg>
